<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3年E組 殺せんせー特別学習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-yellow { 0% { background-color: #fde047; } 50% { background-color: #facc15; } 100% { background-color: #fde047; } }
        .koro-normal { animation: pulse-yellow 2s infinite; }
        .koro-correct { background-color: #fde047 !important; }
        .koro-hint { background-color: #86efac !important; } /* 緑の縞模様の代わり */
        .chat-bubble { border-radius: 20px; padding: 10px 15px; margin-bottom: 10px; max-width: 85%; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center p-4 font-bold text-slate-800">

    <div class="w-full max-w-md bg-yellow-400 rounded-3xl shadow-2xl border-4 border-black overflow-hidden flex flex-col">
        <div id="face" class="h-48 koro-normal flex flex-col items-center justify-center relative border-b-4 border-black">
            <div class="flex justify-center items-center mb-2">
                <div class="w-3 h-3 bg-black rounded-full mx-10"></div>
                <div class="w-3 h-3 bg-black rounded-full mx-10"></div>
            </div>
            <div class="w-16 h-1 bg-black rounded-full"></div> <div id="mark" class="absolute text-red-500 text-7xl font-black opacity-0 transition-opacity">〇</div>
        </div>

        <div class="relative h-40 bg-black border-b-4 border-black">
            <video id="video" autoplay playsinline class="w-full h-full object-cover opacity-80"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="absolute bottom-2 right-2 bg-yellow-400 text-black text-[10px] px-2 py-1 rounded-full border border-black">
                生徒を監視中...
            </div>
        </div>

        <div id="chat-log" class="h-60 overflow-y-auto p-4 bg-white flex flex-col">
            <div class="chat-bubble bg-blue-100 text-blue-800 self-start border border-blue-200">
                ヌルフフフ！さぁ、宿題を見せなさい。あなたの弱点は私がマッハで見抜きますよ。
            </div>
        </div>

        <div class="p-4 bg-yellow-400 border-t-4 border-black flex flex-col gap-3">
            <input type="password" id="api-key" placeholder="Gemini APIキーを入力してねぇ" 
                   class="p-2 rounded-lg border-2 border-black text-sm focus:outline-none">
            <button onclick="checkHomework()" id="btn" 
                    class="bg-slate-900 text-white py-4 rounded-2xl shadow-[0_5px_0_0_rgba(0,0,0,1)] active:shadow-none active:translate-y-[5px] transition-all flex items-center justify-center gap-2">
                📖 宿題を提出する（スキャン）
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const chatLog = document.getElementById('chat-log');
        const face = document.getElementById('face');
        const mark = document.getElementById('mark');

        // カメラ設定（スマホ対応）
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } // 宿題を撮りやすいように背面カメラ優先
        }).then(stream => { 
            video.srcObject = stream; 
        }).catch(() => {
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
        });

        function koroSpeak(text) {
            // 音声合成
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = "ja-JP";
            uttr.pitch = 1.6; 
            uttr.rate = 1.1;
            window.speechSynthesis.speak(uttr);
            
            // ログ追加
            const div = document.createElement('div');
            div.className = "chat-bubble bg-blue-100 text-blue-800 self-start border border-blue-200";
            div.innerText = "殺せんせー: " + text;
            chatLog.appendChild(div);
            chatLog.scrollTo(0, chatLog.scrollHeight);
        }

        async function checkHomework() {
            const key = document.getElementById('api-key').value;
            if (!key) return alert("APIキーを入力してくださいねぇ！");

            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "マッハで思考中...";
            face.className = "h-48 koro-hint flex flex-col items-center justify-center relative border-b-4 border-black";

            // 画像キャプチャ
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "あなたは『暗殺教室』の殺せんせーです。生徒（ユーザー）がカメラに映した宿題を分析し、まずは正解を褒め、間違っている所や弱点にはマッハの速度でヒントを出して。語尾は『〜ですねぇ』、笑い声は『ヌルフフフ』、120文字以内。" },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                
                // 演出：〇を表示
                mark.style.opacity = "1";
                setTimeout(() => mark.style.opacity = "0", 2000);
                
                koroSpeak(aiText);

            } catch (err) {
                console.error(err);
                koroSpeak("おや、通信エラーですねぇ。APIキーが正しいか、電波が良いか確認しなさい！");
            } finally {
                btn.disabled = false;
                btn.innerText = "📖 宿題を提出する（スキャン）";
                face.className = "h-48 koro-normal flex flex-col items-center justify-center relative border-b-4 border-black";
            }
        }
    </script>
</body>
</html>
